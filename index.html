<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi's Bark Blaster</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0a0a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        font-family: monospace;
    }

    #gameCanvas {
        border: 2px solid #333;
        box-shadow:
            0 0 20px rgba(0, 255, 128, 0.3),
            0 0 40px rgba(0, 255, 128, 0.1),
            inset 0 0 20px rgba(0, 0, 0, 0.5);
        image-rendering: pixelated;
        /* CRT scanline overlay */
        background: repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.15) 0px,
            rgba(0, 0, 0, 0.15) 1px,
            transparent 1px,
            transparent 3px
        );
    }

    #muteBtn {
        position: fixed;
        top: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #444;
        color: #fff;
        font-size: 24px;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 4px;
        z-index: 10;
        transition: border-color 0.2s;
    }

    #muteBtn:hover {
        border-color: #0f8;
    }

    /* Touch controls — hidden on desktop, shown on touch devices */
    #touchControls {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 12px 16px;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 20;
        pointer-events: none;
    }

    #touchControls .touch-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        pointer-events: none;
    }

    #touchControls .touch-group {
        display: flex;
        gap: 12px;
        pointer-events: none;
    }

    .touch-btn {
        pointer-events: auto;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 2px solid rgba(0, 255, 128, 0.5);
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 28px;
        font-family: monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
    }

    .touch-btn:active, .touch-btn.active {
        background: rgba(0, 255, 128, 0.3);
        border-color: #0f8;
    }

    .touch-btn.fire-btn {
        width: 88px;
        height: 88px;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 1px;
        border-color: rgba(255, 200, 50, 0.6);
    }

    .touch-btn.fire-btn:active, .touch-btn.fire-btn.active {
        background: rgba(255, 200, 50, 0.3);
        border-color: #fc8;
    }

    .touch-btn.zoomies-btn {
        width: 60px;
        height: 60px;
        font-size: 11px;
        font-weight: bold;
        border-color: rgba(255, 100, 200, 0.5);
        margin-bottom: 6px;
    }

    .touch-btn.zoomies-btn:active, .touch-btn.zoomies-btn.active {
        background: rgba(255, 100, 200, 0.3);
        border-color: #f6c;
    }

    @media (pointer: coarse), (hover: none) {
        #touchControls {
            display: block;
        }
        body {
            justify-content: flex-start;
        }
        #gameCanvas {
            width: 100vw;
            height: calc(100vh - 120px);
            height: calc(100dvh - 120px);
            border: none;
            box-shadow: none;
        }
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>
<button id="muteBtn">&#x1F50A;</button>

<div id="touchControls">
    <div class="touch-row">
        <div class="touch-group" style="flex-wrap: wrap; justify-content: center; width: 168px;">
            <button class="touch-btn" id="btnUp" style="width: 60px; height: 60px; margin-bottom: -4px;">&#x25B2;</button>
            <div style="display: flex; gap: 12px;">
                <button class="touch-btn" id="btnLeft">&#x25C0;</button>
                <button class="touch-btn" id="btnRight">&#x25B6;</button>
            </div>
        </div>
        <div class="touch-group">
            <button class="touch-btn zoomies-btn" id="btnZoomies">Z</button>
            <button class="touch-btn fire-btn" id="btnFire">BARK</button>
        </div>
    </div>
</div>

<script>
// ============================================================
//  KIWI'S BARK BLASTER
//  A Space Invaders-style retro arcade game starring Kiwi,
//  a tiny fluffy Pomeranian defending the backyard from
//  invading squirrels.
// ============================================================

// === AUDIO SYSTEM ===
// Kiwi's Bark Blaster - Chiptune Audio Engine
// Procedurally generated 8-bit sound effects and music using Web Audio API
const AudioSystem = (function () {
    let ctx = null;
    let masterGain = null;
    let muted = false;
    let musicPlaying = false;
    let musicSchedulerId = null;
    let musicNodes = [];

    const BPM = 140;
    const BEAT = 60 / BPM;
    const SIXTEENTH = BEAT / 4;
    const BAR = BEAT * 4;
    let musicStartTime = 0;
    let nextBarScheduleTime = 0;
    let currentBar = 0;
    const TOTAL_BARS = 16;
    const SCHEDULE_AHEAD = 0.2;

    function makeGain(volume) {
        const g = ctx.createGain();
        g.gain.value = volume;
        g.connect(masterGain);
        return g;
    }

    function playTone(type, freq, gainVal, startTime, duration, gainNode) {
        const osc = ctx.createOscillator();
        osc.type = type;
        osc.frequency.value = freq;
        const g = gainNode || makeGain(gainVal);
        osc.connect(g);
        osc.start(startTime);
        osc.stop(startTime + duration);
        osc.onended = () => { osc.disconnect(); if (!gainNode) g.disconnect(); };
        return osc;
    }

    function playNoise(gainVal, startTime, duration, gainNode) {
        const bufferSize = ctx.sampleRate * Math.max(duration, 0.05);
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        const g = gainNode || makeGain(gainVal);
        src.connect(g);
        src.start(startTime);
        src.stop(startTime + duration);
        src.onended = () => { src.disconnect(); if (!gainNode) g.disconnect(); };
        return src;
    }

    function mtof(note) { return 440 * Math.pow(2, (note - 69) / 12); }

    const NOTE = {
        C3: 48, D3: 50, E3: 52, F3: 53, G3: 55, A3: 57, B3: 59,
        C4: 60, D4: 62, E4: 64, F4: 65, G4: 67, A4: 69, B4: 71,
        C5: 72, D5: 74, E5: 76, F5: 77, G5: 79, A5: 81, B5: 83, C6: 84,
        Cs3: 49, Ds3: 51, Fs3: 54, Gs3: 56, As3: 58,
        Cs4: 61, Ds4: 63, Fs4: 66, Gs4: 68, As4: 70,
        Cs5: 73, Ds5: 75, Fs5: 78, Gs5: 80, As5: 82,
        Eb3: 51, Bb3: 58, Eb4: 63, Bb4: 70, Ab4: 68, Eb5: 75, Bb5: 82,
    };

    function init() {
        if (!ctx) {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.value = 1.0;
            masterGain.connect(ctx.destination);
        }
        // Always try to resume — iOS suspends the context and requires
        // resume() to be called from a direct user gesture each time
        if (ctx.state === 'suspended') {
            ctx.resume();
        }
    }

    function playBark() {
        if (!ctx) return;
        const now = ctx.currentTime;
        const g = makeGain(0);
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.linearRampToValueAtTime(400, now + 0.08);
        osc.connect(g);
        g.gain.setValueAtTime(0.28, now);
        g.gain.setValueAtTime(0.28, now + 0.02);
        g.gain.linearRampToValueAtTime(0, now + 0.10);
        osc.start(now);
        osc.stop(now + 0.10);
        osc.onended = () => { osc.disconnect(); g.disconnect(); };
        const osc2 = ctx.createOscillator();
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(1200, now);
        osc2.frequency.linearRampToValueAtTime(600, now + 0.06);
        const g2 = makeGain(0);
        osc2.connect(g2);
        g2.gain.setValueAtTime(0.10, now);
        g2.gain.linearRampToValueAtTime(0, now + 0.07);
        osc2.start(now);
        osc2.stop(now + 0.07);
        osc2.onended = () => { osc2.disconnect(); g2.disconnect(); };
    }

    function playSquirrelHit() {
        if (!ctx) return;
        const now = ctx.currentTime;
        const ng = makeGain(0);
        ng.gain.setValueAtTime(0.30, now);
        ng.gain.linearRampToValueAtTime(0, now + 0.20);
        playNoise(0, now, 0.20, ng);
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.18);
        const g = makeGain(0);
        osc.connect(g);
        g.gain.setValueAtTime(0.22, now);
        g.gain.linearRampToValueAtTime(0, now + 0.20);
        osc.start(now);
        osc.stop(now + 0.20);
        osc.onended = () => { osc.disconnect(); g.disconnect(); };
    }

    function playPowerUp() {
        if (!ctx) return;
        const now = ctx.currentTime;
        const notes = [mtof(NOTE.C5), mtof(NOTE.E5), mtof(NOTE.G5), mtof(NOTE.C6)];
        const step = 0.07;
        notes.forEach((freq, i) => {
            const t = now + i * step;
            const g = makeGain(0);
            g.gain.setValueAtTime(0.22, t);
            g.gain.linearRampToValueAtTime(0.22, t + step * 0.8);
            g.gain.linearRampToValueAtTime(0, t + step * 1.2);
            playTone('square', freq, 0, t, step * 1.3, g);
        });
    }

    function playGameOver() {
        if (!ctx) return;
        const now = ctx.currentTime;
        const notes = [mtof(NOTE.G4), mtof(NOTE.Eb4), mtof(NOTE.C4), mtof(NOTE.G3), mtof(NOTE.Eb3)];
        const step = 0.30;
        notes.forEach((freq, i) => {
            const t = now + i * step;
            const g = makeGain(0);
            g.gain.setValueAtTime(0.20, t);
            g.gain.linearRampToValueAtTime(0.18, t + step * 0.6);
            g.gain.linearRampToValueAtTime(0, t + step * 0.95);
            playTone('triangle', freq, 0, t, step, g);
        });
    }

    function playBossAppear() {
        if (!ctx) return;
        const now = ctx.currentTime;
        const rumbleG = makeGain(0);
        rumbleG.gain.setValueAtTime(0.18, now);
        rumbleG.gain.linearRampToValueAtTime(0.25, now + 0.5);
        rumbleG.gain.linearRampToValueAtTime(0, now + 1.0);
        const rumble = ctx.createOscillator();
        rumble.type = 'sawtooth';
        rumble.frequency.setValueAtTime(55, now);
        rumble.frequency.linearRampToValueAtTime(40, now + 1.0);
        rumble.connect(rumbleG);
        rumble.start(now);
        rumble.stop(now + 1.0);
        rumble.onended = () => { rumble.disconnect(); rumbleG.disconnect(); };
        [mtof(NOTE.D3), mtof(NOTE.D3), mtof(NOTE.Ds3), mtof(NOTE.D3)].forEach((freq, i) => {
            const t = now + i * 0.22;
            const g = makeGain(0);
            g.gain.setValueAtTime(0.25, t);
            g.gain.linearRampToValueAtTime(0, t + 0.12);
            playTone('square', freq, 0, t, 0.14, g);
        });
        const warnG = makeGain(0);
        warnG.gain.setValueAtTime(0, now);
        warnG.gain.linearRampToValueAtTime(0.15, now + 0.3);
        warnG.gain.linearRampToValueAtTime(0, now + 1.0);
        const warn = ctx.createOscillator();
        warn.type = 'square';
        warn.frequency.setValueAtTime(mtof(NOTE.A5), now);
        warn.connect(warnG);
        warn.start(now);
        warn.stop(now + 1.0);
        warn.onended = () => { warn.disconnect(); warnG.disconnect(); };
    }

    function playBossHit() {
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.12);
        const g = makeGain(0);
        osc.connect(g);
        g.gain.setValueAtTime(0.30, now);
        g.gain.linearRampToValueAtTime(0, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
        osc.onended = () => { osc.disconnect(); g.disconnect(); };
        const ng = makeGain(0);
        ng.gain.setValueAtTime(0.15, now);
        ng.gain.linearRampToValueAtTime(0, now + 0.10);
        playNoise(0, now, 0.10, ng);
    }

    function playBossDefeat() {
        if (!ctx) return;
        const now = ctx.currentTime;
        const notes = [
            { n: NOTE.C4, dur: 0.15 }, { n: NOTE.E4, dur: 0.15 },
            { n: NOTE.G4, dur: 0.15 }, { n: NOTE.C5, dur: 0.20 },
            { n: NOTE.E5, dur: 0.20 }, { n: NOTE.G5, dur: 0.25 },
            { n: NOTE.C6, dur: 0.45 }, { n: NOTE.C6, dur: 0.35 },
        ];
        let t = now;
        notes.forEach((note) => {
            const freq = mtof(note.n);
            const g = makeGain(0);
            g.gain.setValueAtTime(0.22, t);
            g.gain.setValueAtTime(0.22, t + note.dur * 0.7);
            g.gain.linearRampToValueAtTime(0, t + note.dur * 0.98);
            playTone('square', freq, 0, t, note.dur, g);
            t += note.dur;
        });
        const harmonyStart = now + 0.65;
        const hNotes = [
            { n: NOTE.E5, dur: 0.25 }, { n: NOTE.G5, dur: 0.45 }, { n: NOTE.E5, dur: 0.35 },
        ];
        let ht = harmonyStart;
        hNotes.forEach((note) => {
            const g = makeGain(0);
            g.gain.setValueAtTime(0.12, ht);
            g.gain.linearRampToValueAtTime(0, ht + note.dur * 0.9);
            playTone('square', mtof(note.n), 0, ht, note.dur, g);
            ht += note.dur;
        });
    }

    const R = 0;
    const melodyBars = [
        [NOTE.C5,R,NOTE.E5,R,NOTE.G5,R,NOTE.G5,R,NOTE.E5,R,NOTE.C5,R,NOTE.E5,R,NOTE.G5,R],
        [NOTE.A5,R,NOTE.G5,R,NOTE.E5,R,NOTE.G5,R,NOTE.C5,R,R,R,NOTE.C5,NOTE.D5,NOTE.E5,R],
        [NOTE.C5,R,NOTE.E5,R,NOTE.G5,R,NOTE.A5,R,NOTE.G5,R,NOTE.E5,R,NOTE.D5,R,NOTE.C5,R],
        [NOTE.D5,R,NOTE.E5,R,NOTE.D5,R,R,R,NOTE.C5,R,R,R,R,R,R,R],
        [NOTE.E5,R,NOTE.G5,R,NOTE.A5,R,NOTE.G5,R,NOTE.E5,R,NOTE.C5,R,NOTE.D5,R,NOTE.E5,R],
        [NOTE.G5,R,NOTE.A5,R,NOTE.C6,R,NOTE.A5,R,NOTE.G5,R,R,R,NOTE.G5,NOTE.A5,NOTE.G5,R],
        [NOTE.E5,R,NOTE.G5,R,NOTE.A5,R,NOTE.C6,R,NOTE.A5,R,NOTE.G5,R,NOTE.E5,R,NOTE.D5,R],
        [NOTE.E5,R,NOTE.D5,R,NOTE.C5,R,R,R,NOTE.C5,R,R,R,R,R,R,R],
        [NOTE.C4,R,NOTE.E4,R,NOTE.G4,R,NOTE.C5,R,NOTE.B4,R,NOTE.G4,R,NOTE.E4,R,NOTE.G4,R],
        [NOTE.A4,R,NOTE.C5,R,NOTE.E5,R,NOTE.C5,R,NOTE.A4,R,R,R,NOTE.A4,NOTE.B4,NOTE.C5,R],
        [NOTE.D5,R,NOTE.E5,R,NOTE.D5,R,NOTE.C5,R,NOTE.B4,R,NOTE.C5,R,NOTE.D5,R,NOTE.E5,R],
        [NOTE.D5,R,NOTE.C5,R,NOTE.B4,R,R,R,NOTE.G4,R,R,R,R,R,R,R],
        [NOTE.C5,R,NOTE.E5,R,NOTE.G5,R,NOTE.G5,R,NOTE.E5,R,NOTE.C5,R,NOTE.E5,R,NOTE.G5,R],
        [NOTE.A5,R,NOTE.G5,R,NOTE.E5,R,NOTE.G5,R,NOTE.A5,R,NOTE.C6,R,NOTE.A5,R,NOTE.G5,R],
        [NOTE.E5,R,NOTE.G5,R,NOTE.A5,R,NOTE.C6,R,NOTE.C6,R,NOTE.A5,R,NOTE.G5,R,NOTE.A5,R],
        [NOTE.C6,R,NOTE.A5,R,NOTE.G5,R,NOTE.E5,R,NOTE.D5,R,NOTE.C5,R,NOTE.B4,R,NOTE.C5,R],
    ];
    const bassBars = [
        [NOTE.C3,R,R,R,NOTE.G3,R,R,R,NOTE.C3,R,R,R,NOTE.G3,R,R,R],
        [NOTE.A3,R,R,R,NOTE.E3,R,R,R,NOTE.A3,R,R,R,NOTE.E3,R,R,R],
        [NOTE.F3,R,R,R,NOTE.C3,R,R,R,NOTE.F3,R,R,R,NOTE.C3,R,R,R],
        [NOTE.G3,R,R,R,NOTE.D3,R,R,R,NOTE.G3,R,R,R,NOTE.D3,R,R,R],
        [NOTE.C3,R,R,R,NOTE.G3,R,R,R,NOTE.C3,R,R,R,NOTE.G3,R,R,R],
        [NOTE.F3,R,R,R,NOTE.C3,R,R,R,NOTE.F3,R,R,R,NOTE.A3,R,R,R],
        [NOTE.A3,R,R,R,NOTE.E3,R,R,R,NOTE.A3,R,R,R,NOTE.E3,R,R,R],
        [NOTE.G3,R,R,R,NOTE.D3,R,R,R,NOTE.G3,R,R,R,NOTE.G3,R,NOTE.B3,R],
        [NOTE.C3,R,R,R,NOTE.C3,R,NOTE.E3,R,NOTE.G3,R,R,R,NOTE.E3,R,R,R],
        [NOTE.A3,R,R,R,NOTE.A3,R,NOTE.C3,R,NOTE.E3,R,R,R,NOTE.A3,R,R,R],
        [NOTE.D3,R,R,R,NOTE.A3,R,R,R,NOTE.D3,R,R,R,NOTE.F3,R,R,R],
        [NOTE.G3,R,R,R,NOTE.D3,R,R,R,NOTE.G3,R,R,R,NOTE.G3,R,NOTE.B3,R],
        [NOTE.C3,R,R,R,NOTE.G3,R,R,R,NOTE.C3,R,R,R,NOTE.G3,R,R,R],
        [NOTE.F3,R,R,R,NOTE.C3,R,R,R,NOTE.A3,R,R,R,NOTE.E3,R,R,R],
        [NOTE.F3,R,R,R,NOTE.F3,R,NOTE.G3,R,NOTE.G3,R,R,R,NOTE.G3,R,NOTE.B3,R],
        [NOTE.G3,R,R,R,NOTE.G3,R,NOTE.B3,R,NOTE.C3,R,R,R,NOTE.C3,R,NOTE.G3,R],
    ];
    const K=1, S=2, H=3;
    const drumPattern = [
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,H],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,H],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,H],
        [K,R,H,R,S,R,H,H,K,R,H,R,S,S,S,S],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,H],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,H],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,H],
        [K,R,H,R,S,R,H,H,K,K,H,R,S,S,S,S],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,R],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,R],
        [K,R,H,H,S,R,H,R,K,R,H,H,S,R,H,R],
        [K,R,H,R,S,R,H,H,K,K,S,S,K,K,S,S],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,H],
        [K,R,H,R,S,R,H,R,K,R,H,R,S,R,H,H],
        [K,R,H,H,S,R,H,H,K,R,H,H,S,R,H,H],
        [K,K,S,S,K,K,S,S,K,K,S,S,S,S,S,S],
    ];

    function scheduleBar(barIndex, startTime) {
        const melody = melodyBars[barIndex];
        const bass = bassBars[barIndex];
        const drums = drumPattern[barIndex];
        for (let i = 0; i < 16; i++) {
            const noteVal = melody[i];
            if (noteVal === R) continue;
            const t = startTime + i * SIXTEENTH;
            let len = SIXTEENTH;
            for (let j = i + 1; j < 16; j++) { if (melody[j] !== R) break; len += SIXTEENTH; }
            const dur = len * 0.85, freq = mtof(noteVal);
            const osc = ctx.createOscillator();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, t);
            const g = makeGain(0);
            g.gain.setValueAtTime(0.12, t);
            g.gain.setValueAtTime(0.12, t + dur * 0.7);
            g.gain.linearRampToValueAtTime(0, t + dur);
            osc.connect(g); osc.start(t); osc.stop(t + dur + 0.01);
            osc.onended = () => { osc.disconnect(); g.disconnect(); };
            musicNodes.push(osc);
        }
        for (let i = 0; i < 16; i++) {
            const noteVal = bass[i];
            if (noteVal === R) continue;
            const t = startTime + i * SIXTEENTH;
            let len = SIXTEENTH;
            for (let j = i + 1; j < 16; j++) { if (bass[j] !== R) break; len += SIXTEENTH; }
            const dur = len * 0.80, freq = mtof(noteVal);
            const osc = ctx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, t);
            const g = makeGain(0);
            g.gain.setValueAtTime(0.18, t);
            g.gain.setValueAtTime(0.18, t + dur * 0.6);
            g.gain.linearRampToValueAtTime(0, t + dur);
            osc.connect(g); osc.start(t); osc.stop(t + dur + 0.01);
            osc.onended = () => { osc.disconnect(); g.disconnect(); };
            musicNodes.push(osc);
        }
        for (let i = 0; i < 16; i++) {
            const hit = drums[i];
            if (hit === R) continue;
            const t = startTime + i * SIXTEENTH;
            if (hit === K) {
                const osc = ctx.createOscillator(); osc.type = 'sine';
                osc.frequency.setValueAtTime(160, t);
                osc.frequency.exponentialRampToValueAtTime(40, t + 0.08);
                const g = makeGain(0);
                g.gain.setValueAtTime(0.20, t); g.gain.linearRampToValueAtTime(0, t + 0.10);
                osc.connect(g); osc.start(t); osc.stop(t + 0.10);
                osc.onended = () => { osc.disconnect(); g.disconnect(); };
                musicNodes.push(osc);
            } else if (hit === S) {
                const ng = makeGain(0);
                ng.gain.setValueAtTime(0.14, t); ng.gain.linearRampToValueAtTime(0, t + 0.08);
                musicNodes.push(playNoise(0, t, 0.08, ng));
                const osc = ctx.createOscillator(); osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(120, t + 0.04);
                const sg = makeGain(0);
                sg.gain.setValueAtTime(0.10, t); sg.gain.linearRampToValueAtTime(0, t + 0.05);
                osc.connect(sg); osc.start(t); osc.stop(t + 0.06);
                osc.onended = () => { osc.disconnect(); sg.disconnect(); };
                musicNodes.push(osc);
            } else if (hit === H) {
                const hg = makeGain(0);
                hg.gain.setValueAtTime(0.06, t); hg.gain.linearRampToValueAtTime(0, t + 0.03);
                musicNodes.push(playNoise(0, t, 0.03, hg));
            }
        }
    }

    function musicScheduler() {
        if (!musicPlaying) return;
        while (nextBarScheduleTime < ctx.currentTime + SCHEDULE_AHEAD) {
            scheduleBar(currentBar % TOTAL_BARS, nextBarScheduleTime);
            nextBarScheduleTime += BAR;
            currentBar++;
        }
        musicSchedulerId = requestAnimationFrame(musicScheduler);
    }

    function startMusic() {
        if (!ctx || musicPlaying) return;
        // Ensure audio context is running (critical for iOS)
        if (ctx.state === 'suspended') {
            ctx.resume().then(() => {
                if (!musicPlaying) startMusicInternal();
            });
            // Also try immediately in case resume is synchronous
            if (ctx.state === 'running') {
                startMusicInternal();
                return;
            }
            return;
        }
        startMusicInternal();
    }

    function startMusicInternal() {
        musicPlaying = true;
        currentBar = 0;
        musicStartTime = ctx.currentTime + 0.05;
        nextBarScheduleTime = musicStartTime;
        musicScheduler();
    }

    function stopMusic() {
        musicPlaying = false;
        if (musicSchedulerId !== null) { cancelAnimationFrame(musicSchedulerId); musicSchedulerId = null; }
        const now = ctx ? ctx.currentTime : 0;
        musicNodes.forEach((node) => {
            try { node.stop(now); } catch (_) {}
            try { node.disconnect(); } catch (_) {}
        });
        musicNodes = [];
    }

    function toggleMute() {
        if (!ctx) return false;
        muted = !muted;
        masterGain.gain.setValueAtTime(muted ? 0 : 1, ctx.currentTime);
        return muted;
    }

    return {
        init, playBark, playSquirrelHit, playPowerUp,
        playGameOver, playBossAppear, playBossHit, playBossDefeat,
        startMusic, stopMusic, toggleMute
    };
})();

// ============================================================

const keys = {};

document.addEventListener('keydown', (e) => {
    // Initialize audio on first keypress
    if (!audioInitialized) {
        AudioSystem.init();
        audioInitialized = true;
    }

    keys[e.code] = true;

    // Prevent scrolling for game keys
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) {
        e.preventDefault();
    }

    // Handle enter key for state transitions
    if (e.code === 'Enter') {
        e.preventDefault();
        if (game.state === STATES.TITLE) {
            game.startGame();
        } else if (game.state === STATES.GAME_OVER) {
            game.resetToTitle();
        }
    }

    // Up arrow triggers jump (one-shot, not hold)
    if (e.code === 'ArrowUp' && (game.state === STATES.PLAYING || game.state === STATES.BOSS)) {
        if (game.kiwi && game.kiwi.onGround) {
            game.kiwi.jump();
        }
    }

    // Z key triggers ZOOMIES manually
    if (e.code === 'KeyZ' && (game.state === STATES.PLAYING || game.state === STATES.BOSS)) {
        game.triggerZoomies();
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// Dynamically size canvas to fill available screen on mobile
function resizeCanvasForMobile() {
    if (!isTouchDevice) return;
    const touchBar = document.getElementById('touchControls');
    const touchHeight = touchBar ? touchBar.offsetHeight : 120;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = (window.innerHeight - touchHeight) + 'px';
}

if (isTouchDevice) {
    resizeCanvasForMobile();
    window.addEventListener('resize', resizeCanvasForMobile);
    setTimeout(resizeCanvasForMobile, 100);
}

function initTouch() {
    function bindHold(btnId, keyCode) {
        const btn = document.getElementById(btnId);
        if (!btn) return;

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!audioInitialized) {
                AudioSystem.init();
                audioInitialized = true;
            }
            keys[keyCode] = true;
            btn.classList.add('active');
        }, { passive: false });

        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[keyCode] = false;
            btn.classList.remove('active');
        }, { passive: false });

        btn.addEventListener('touchcancel', (e) => {
            keys[keyCode] = false;
            btn.classList.remove('active');
        });
    }

    // D-pad: hold to move
    bindHold('btnLeft', 'ArrowLeft');
    bindHold('btnRight', 'ArrowRight');

    // Fire: hold to auto-fire
    bindHold('btnFire', 'Space');

    // Zoomies: tap to trigger (one-shot, not hold)
    const btnZ = document.getElementById('btnZoomies');
    if (btnZ) {
        btnZ.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!audioInitialized) {
                AudioSystem.init();
                audioInitialized = true;
            }
            btnZ.classList.add('active');
            if (game.state === STATES.PLAYING || game.state === STATES.BOSS) {
                game.triggerZoomies();
            }
        }, { passive: false });

        btnZ.addEventListener('touchend', (e) => {
            e.preventDefault();
            btnZ.classList.remove('active');
        }, { passive: false });
    }

    // Jump: tap to trigger (one-shot, not hold)
    const btnUp = document.getElementById('btnUp');
    if (btnUp) {
        btnUp.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!audioInitialized) {
                AudioSystem.init();
                audioInitialized = true;
            }
            btnUp.classList.add('active');
            if (game.kiwi && game.kiwi.onGround &&
                (game.state === STATES.PLAYING || game.state === STATES.BOSS)) {
                game.kiwi.jump();
            }
        }, { passive: false });

        btnUp.addEventListener('touchend', (e) => {
            e.preventDefault();
            btnUp.classList.remove('active');
        }, { passive: false });
    }

    // Tap canvas to start / restart
    canvas.addEventListener('touchstart', (e) => {
        if (!audioInitialized) {
            AudioSystem.init();
            audioInitialized = true;
        }
        if (game.state === STATES.TITLE) {
            e.preventDefault();
            game.startGame();
        } else if (game.state === STATES.GAME_OVER) {
            e.preventDefault();
            game.resetToTitle();
        }
    }, { passive: false });
}

function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
}

function rectCollide(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randFloat(min, max) {
    return Math.random() * (max - min) + min;
}

function drawPixelRect(x, y, w, h, color) {
    ctx.fillStyle = color;

}

// --- Kiwi (Pomeranian) sprite ---
function drawKiwi(x, y, scale = 1, frame = 0) {
    const s = scale;
    const cx = x;
    const cy = y;

    // === POMERANIAN SPRITE ===
    // Key features: puffball body, lion-like chest ruff, fox-like face,
    // plumed tail curled UP over back, tiny erect ears, short legs hidden in fluff

    // --- Plumed tail curled UP and OVER the back ---
    // This is THE signature Pom feature - big fluffy plume arching over the body
    ctx.fillStyle = COLORS.KIWI_BODY;
    // Tail base curving up from back
    ctx.beginPath();
    ctx.moveTo(cx + 6 * s, cy - 4 * s);
    ctx.quadraticCurveTo(cx + 14 * s, cy - 18 * s, cx + 4 * s, cy - 16 * s);
    ctx.quadraticCurveTo(cx - 2 * s, cy - 14 * s, cx + 6 * s, cy - 4 * s);
    ctx.fill();
    // Fluffy tail plume (multiple overlapping circles for volume)
    ctx.fillStyle = '#e0a050';
    fillCircle(cx + 10 * s, cy - 14 * s, 5 * s);
    fillCircle(cx + 6 * s, cy - 16 * s, 5 * s);
    fillCircle(cx + 3 * s, cy - 15 * s, 4 * s);
    ctx.fillStyle = COLORS.KIWI_LIGHT;
    fillCircle(cx + 8 * s, cy - 16 * s, 3.5 * s);
    fillCircle(cx + 4 * s, cy - 17 * s, 3 * s);

    // --- Fluffy puffball body ---
    // Pomeranians look like round fluffballs - fur radiates outward
    // Outer fluff ring (darker orange)
    ctx.fillStyle = COLORS.KIWI_BODY;
    fillCircle(cx, cy + 4 * s, 15 * s);
    // Fluffy fur tufts radiating outward (puffball effect)
    const tufts = 10;
    for (let i = 0; i < tufts; i++) {
        const angle = (i / tufts) * Math.PI * 2 - Math.PI * 0.3;
        const dist = 13 * s;
        const tx = cx + Math.cos(angle) * dist;
        const ty = cy + 4 * s + Math.sin(angle) * dist * 0.85;
        ctx.fillStyle = i % 2 === 0 ? COLORS.KIWI_BODY : '#d89840';
        fillCircle(tx, ty, 5 * s);
    }
    // Inner body fill
    ctx.fillStyle = COLORS.KIWI_BODY;
    fillCircle(cx, cy + 4 * s, 13 * s);

    // --- Lion-like chest ruff/mane ---
    // This massive chest fluff is what makes Poms look like tiny lions
    ctx.fillStyle = COLORS.KIWI_LIGHT;
    fillCircle(cx, cy + 2 * s, 11 * s);
    // Extra chest volume
    fillCircle(cx - 5 * s, cy + 0 * s, 7 * s);
    fillCircle(cx + 5 * s, cy + 0 * s, 7 * s);
    fillCircle(cx, cy + 6 * s, 8 * s);
    // Ruff texture tufts
    ctx.fillStyle = '#f0c878';
    fillCircle(cx - 7 * s, cy - 1 * s, 4 * s);
    fillCircle(cx + 7 * s, cy - 1 * s, 4 * s);
    fillCircle(cx - 3 * s, cy + 7 * s, 4 * s);
    fillCircle(cx + 3 * s, cy + 7 * s, 4 * s);
    fillCircle(cx, cy + 1 * s, 5 * s);

    // --- Fox-like wedge-shaped head ---
    // Pom heads are round on top but taper to a short pointed muzzle
    ctx.fillStyle = COLORS.KIWI_BODY;
    fillCircle(cx, cy - 8 * s, 9 * s);
    // Cheek fluff (Poms have very fluffy cheeks)
    ctx.fillStyle = '#d89840';
    fillCircle(cx - 7 * s, cy - 6 * s, 5 * s);
    fillCircle(cx + 7 * s, cy - 6 * s, 5 * s);
    // Top of head fluff
    ctx.fillStyle = COLORS.KIWI_BODY;
    fillCircle(cx, cy - 12 * s, 6 * s);
    fillCircle(cx - 3 * s, cy - 11 * s, 5 * s);
    fillCircle(cx + 3 * s, cy - 11 * s, 5 * s);

    // --- Short pointed muzzle (fox-like) ---
    ctx.fillStyle = COLORS.KIWI_LIGHT;
    // Muzzle area - lighter cream/tan
    ctx.beginPath();
    ctx.ellipse(cx, cy - 5 * s, 5 * s, 4 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- Small erect triangular ears (close together on top of head) ---
    // Pom ears are TINY compared to their head fluff
    ctx.fillStyle = COLORS.KIWI_EAR;
    // Left ear
    ctx.beginPath();
    ctx.moveTo(cx - 5 * s, cy - 13 * s);
    ctx.lineTo(cx - 3 * s, cy - 19 * s);
    ctx.lineTo(cx - 1 * s, cy - 13 * s);
    ctx.closePath();
    ctx.fill();
    // Right ear
    ctx.beginPath();
    ctx.moveTo(cx + 5 * s, cy - 13 * s);
    ctx.lineTo(cx + 3 * s, cy - 19 * s);
    ctx.lineTo(cx + 1 * s, cy - 13 * s);
    ctx.closePath();
    ctx.fill();
    // Inner ear (pink)
    ctx.fillStyle = '#e0a088';
    ctx.beginPath();
    ctx.moveTo(cx - 4.5 * s, cy - 13.5 * s);
    ctx.lineTo(cx - 3 * s, cy - 17.5 * s);
    ctx.lineTo(cx - 1.5 * s, cy - 13.5 * s);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + 4.5 * s, cy - 13.5 * s);
    ctx.lineTo(cx + 3 * s, cy - 17.5 * s);
    ctx.lineTo(cx + 1.5 * s, cy - 13.5 * s);
    ctx.closePath();
    ctx.fill();

    // --- Eyes (dark, bright, expressive - slightly almond-shaped) ---
    ctx.fillStyle = '#ffffff';
    fillCircle(cx - 4 * s, cy - 8 * s, 2.8 * s);
    fillCircle(cx + 4 * s, cy - 8 * s, 2.8 * s);
    ctx.fillStyle = COLORS.KIWI_EYE;
    fillCircle(cx - 4 * s, cy - 8 * s, 1.8 * s);
    fillCircle(cx + 4 * s, cy - 8 * s, 1.8 * s);
    // Eye shine (bright, happy expression)
    ctx.fillStyle = '#ffffff';
    fillCircle(cx - 3.2 * s, cy - 8.8 * s, 0.9 * s);
    fillCircle(cx + 4.8 * s, cy - 8.8 * s, 0.9 * s);

    // --- Nose (small, black, at tip of muzzle) ---
    ctx.fillStyle = COLORS.KIWI_NOSE;
    fillCircle(cx, cy - 4.5 * s, 1.8 * s);

    // --- Happy Pom smile with tiny tongue ---
    ctx.strokeStyle = COLORS.KIWI_NOSE;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx - 1 * s, cy - 3 * s, 1.5 * s, -0.2, Math.PI * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx + 1 * s, cy - 3 * s, 1.5 * s, Math.PI * 0.3, Math.PI + 0.2);
    ctx.stroke();
    // Tiny pink tongue poking out (classic Pom!)
    ctx.fillStyle = '#e06080';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 1.5 * s, 1.5 * s, 2 * s, 0, 0, Math.PI);
    ctx.fill();

    // --- Tiny feet (barely visible under fluff) ---
    ctx.fillStyle = COLORS.KIWI_DARK;
    fillCircle(cx - 6 * s, cy + 15 * s, 3 * s);
    fillCircle(cx + 6 * s, cy + 15 * s, 3 * s);
}

function drawKiwiMini(x, y) {

// --- Squirrel sprite ---
function drawSquirrel(x, y, frame = 0) {
    const s = 1;

    // Bushy tail
    ctx.fillStyle = COLORS.SQUIRREL_TAIL;
    ctx.beginPath();
    ctx.ellipse(cx(x, 0, s), cy(y, -8, s), 6 * s, 12 * s, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = COLORS.SQUIRREL_BODY;
    fillCircle(cx(x, 0, s), cy(y, 4, s), 10 * s);

    // Belly
    ctx.fillStyle = COLORS.SQUIRREL_BELLY;
    fillCircle(cx(x, 0, s), cy(y, 6, s), 6 * s);

    // Head
    ctx.fillStyle = COLORS.SQUIRREL_BODY;
    fillCircle(cx(x, 0, s), cy(y, -6, s), 7 * s);

    // Ears
    ctx.fillStyle = COLORS.SQUIRREL_DARK;
    fillCircle(cx(x, -5, s), cy(y, -12, s), 3 * s);
    fillCircle(cx(x, 5, s), cy(y, -12, s), 3 * s);

    // Eyes
    ctx.fillStyle = '#ffffff';
    fillCircle(cx(x, -3, s), cy(y, -7, s), 2.5 * s);
    fillCircle(cx(x, 3, s), cy(y, -7, s), 2.5 * s);
    ctx.fillStyle = '#111111';
    fillCircle(cx(x, -3, s), cy(y, -7, s), 1.5 * s);
    fillCircle(cx(x, 3, s), cy(y, -7, s), 1.5 * s);

    // Nose
    ctx.fillStyle = '#553333';
    fillCircle(cx(x, 0, s), cy(y, -4, s), 1.5 * s);

    // Arms - animate between frames
    ctx.fillStyle = COLORS.SQUIRREL_DARK;
    if (frame === 0) {
        // Arms down
        drawPixelRect(x - 11, y + 0, 4, 8, COLORS.SQUIRREL_DARK);
        drawPixelRect(x + 7, y + 0, 4, 8, COLORS.SQUIRREL_DARK);
    } else {
        // Arms up
        drawPixelRect(x - 12, y - 6, 4, 8, COLORS.SQUIRREL_DARK);
        drawPixelRect(x + 8, y - 6, 4, 8, COLORS.SQUIRREL_DARK);
    }

    // Feet
    ctx.fillStyle = COLORS.SQUIRREL_DARK;
    fillCircle(cx(x, -4, s), cy(y, 13, s), 3 * s);
    fillCircle(cx(x, 4, s), cy(y, 13, s), 3 * s);

    function cx(baseX, offX, scale) { return baseX + offX * scale; }
    function cy(baseY, offY, scale) { return baseY + offY * scale; }
}

// --- Boss Raccoon ---
function drawRaccoon(x, y, hp, maxHp) {
    const s = 1.5;

    // Body
    ctx.fillStyle = COLORS.RACCOON_BODY;
    ctx.beginPath();
    ctx.ellipse(x, y + 8 * s, 22 * s, 18 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly
    ctx.fillStyle = COLORS.RACCOON_LIGHT;
    ctx.beginPath();
    ctx.ellipse(x, y + 12 * s, 14 * s, 12 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Bushy tail with stripes
    ctx.fillStyle = COLORS.RACCOON_BODY;
    ctx.beginPath();
    ctx.ellipse(x + 28 * s, y - 4 * s, 8 * s, 14 * s, 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Tail stripes
    ctx.fillStyle = COLORS.RACCOON_DARK;
    for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(x + 28 * s, y + (-10 + i * 7) * s, 8 * s, 2 * s, 0.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Head
    ctx.fillStyle = COLORS.RACCOON_BODY;
    fillCircle(x, y - 12 * s, 14 * s);

    // Mask (the signature raccoon feature)
    ctx.fillStyle = COLORS.RACCOON_MASK;
    // Left mask
    ctx.beginPath();
    ctx.ellipse(x - 6 * s, y - 14 * s, 7 * s, 5 * s, -0.2, 0, Math.PI * 2);
    ctx.fill();
    // Right mask
    ctx.beginPath();
    ctx.ellipse(x + 6 * s, y - 14 * s, 7 * s, 5 * s, 0.2, 0, Math.PI * 2);
    ctx.fill();

    // Light patches around eyes
    ctx.fillStyle = COLORS.RACCOON_LIGHT;
    fillCircle(x - 6 * s, y - 14 * s, 4 * s);
    fillCircle(x + 6 * s, y - 14 * s, 4 * s);

    // Eyes (menacing)
    ctx.fillStyle = '#ff3333';
    fillCircle(x - 6 * s, y - 14 * s, 3 * s);
    fillCircle(x + 6 * s, y - 14 * s, 3 * s);
    ctx.fillStyle = '#111';
    fillCircle(x - 6 * s, y - 14 * s, 1.8 * s);
    fillCircle(x + 6 * s, y - 14 * s, 1.8 * s);
    // Eye shine
    ctx.fillStyle = '#ff9999';
    fillCircle(x - 5 * s, y - 15 * s, 1 * s);
    fillCircle(x + 7 * s, y - 15 * s, 1 * s);

    // Ears
    ctx.fillStyle = COLORS.RACCOON_DARK;
    fillCircle(x - 10 * s, y - 22 * s, 5 * s);
    fillCircle(x + 10 * s, y - 22 * s, 5 * s);
    ctx.fillStyle = '#999';
    fillCircle(x - 10 * s, y - 22 * s, 3 * s);
    fillCircle(x + 10 * s, y - 22 * s, 3 * s);

    // Nose
    ctx.fillStyle = COLORS.RACCOON_NOSE;
    fillCircle(x, y - 8 * s, 3 * s);

    // Mouth (menacing grin)
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y - 5 * s, 5 * s, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // Paws
    ctx.fillStyle = COLORS.RACCOON_DARK;
    fillCircle(x - 16 * s, y + 22 * s, 5 * s);
    fillCircle(x + 16 * s, y + 22 * s, 5 * s);

    // Health bar
    const barW = 80;
    const barH = 8;
    const barX = x - barW / 2;
    const barY = y - 40 * s;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    const hpRatio = hp / maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? '#00ff44' : hpRatio > 0.25 ? '#ffaa00' : '#ff2222';
    ctx.fillRect(barX + 1, barY + 1, (barW - 2) * hpRatio, barH - 2);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
}

// --- Projectiles ---
function drawBark(x, y) {
    // Sound wave rings
    ctx.strokeStyle = '#ffdd44';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
        ctx.globalAlpha = 1 - i * 0.3;
        ctx.beginPath();
        ctx.arc(x, y + i * 6, 4 + i * 3, Math.PI * 1.2, Math.PI * 1.8);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // "WOOF" text bubble
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WOOF!', x, y - 6);
}

function drawAcorn(x, y) {
    // Acorn cap
    ctx.fillStyle = COLORS.ACORN_CAP;
    ctx.beginPath();
    ctx.arc(x, y - 2, 5, Math.PI, Math.PI * 2);
    ctx.fill();
    // Cap texture
    ctx.fillStyle = '#4a2a0e';
    drawPixelRect(x - 4, y - 4, 2, 2, '#4a2a0e');
    drawPixelRect(x, y - 4, 2, 2, '#4a2a0e');
    drawPixelRect(x - 2, y - 6, 2, 2, '#4a2a0e');
    // Cap stem
    ctx.fillStyle = '#3a2010';
    drawPixelRect(x - 1, y - 7, 2, 3, '#3a2010');

    // Acorn body
    ctx.fillStyle = COLORS.ACORN_BODY;
    ctx.beginPath();
    ctx.ellipse(x, y + 3, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = '#a07050';
    ctx.beginPath();
    ctx.ellipse(x - 1, y + 2, 2, 3, 0, 0, Math.PI * 2);

function drawGoldenBone(x, y, t) {

function drawKiwiFruit(x, y) {

    fillCircle(x, y, 10);
    // Inner green flesh

    fillCircle(x, y, 8);
    // Lighter center

    fillCircle(x, y, 4);
    // White center

function drawSpinnies(x, y, t) {
    // Spinning paw-print swirl icon
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(t * 6);
    // Central pad
    ctx.fillStyle = COLORS.SPINNIES_PINK;
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    // Four toe pads in a circle
    for (let i = 0; i < 4; i++) {
        const a = (Math.PI * 2 / 4) * i;
        ctx.fillStyle = COLORS.SPINNIES_LIGHT;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * 7, Math.sin(a) * 7, 3, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawBird(x, y, frame) {
    // Body
    ctx.fillStyle = COLORS.BIRD_BODY;
    ctx.beginPath();
    ctx.ellipse(x, y, 12, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // Wing (flap animation)
    ctx.fillStyle = COLORS.BIRD_WING;
    const wingY = frame === 0 ? -8 : -3;
    ctx.beginPath();
    ctx.moveTo(x - 4, y);
    ctx.lineTo(x - 14, y + wingY);
    ctx.lineTo(x + 4, y);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + 4, y);
    ctx.lineTo(x + 14, y + wingY);
    ctx.lineTo(x - 4, y);
    ctx.closePath();
    ctx.fill();
    // Beak
    ctx.fillStyle = COLORS.BIRD_BEAK;
    ctx.beginPath();
    ctx.moveTo(x + 12, y - 1);
    ctx.lineTo(x + 17, y + 1);
    ctx.lineTo(x + 12, y + 3);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(x + 6, y - 2, 2, 0, Math.PI * 2);
    ctx.fill();
}

function drawBee(x, y, frame) {
    // Body
    ctx.fillStyle = COLORS.BEE_BODY;
    ctx.beginPath();
    ctx.ellipse(x, y, 9, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // Black stripes
    ctx.fillStyle = COLORS.BEE_STRIPE;
    for (let i = -1; i <= 1; i++) {
        ctx.fillRect(x - 8 + i * 6, y - 3, 3, 6);
    }
    // Wings (buzz animation)
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = COLORS.BEE_WING;
    const wingSpread = frame === 0 ? -9 : -6;
    ctx.beginPath();
    ctx.ellipse(x - 4, y + wingSpread, 5, 3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 4, y + wingSpread, 5, 3, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Stinger
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.moveTo(x - 9, y);
    ctx.lineTo(x - 13, y + 1);
    ctx.lineTo(x - 9, y + 2);
    ctx.closePath();
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(x + 5, y - 2, 1.5, 0, Math.PI * 2);

}

function drawMailman(x, y, frame, hp) {

    ctx.fillRect(x - 8, y + 8, 7, 8);

// ============================================================
//  PARTICLE SYSTEM
// ============================================================

class Particle {
    constructor(x, y, vx, vy, color, life, size) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.size = size;
    }

    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += 100 * dt; // gravity
        this.life -= dt;
    }

    draw() {
        const alpha = clamp(this.life / this.maxLife, 0, 1);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(
            Math.round(this.x - this.size / 2),
            Math.round(this.y - this.size / 2),
            this.size,
            this.size
        );
        ctx.globalAlpha = 1;
    }

    isDead() {
        return this.life <= 0;
    }
}

const particles = [];

function spawnExplosion(x, y, colors, count = 12) {
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + randFloat(-0.3, 0.3);
        const speed = randFloat(60, 200);
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed - 50;
        const color = colors[randInt(0, colors.length - 1)];
        const life = randFloat(0.3, 0.8);
        const size = randInt(2, 5);
        particles.push(new Particle(x, y, vx, vy, color, life, size));
    }
}

function spawnScreenFlash() {
    game.screenFlash = 1.0;
}

// ============================================================
//  ENTITY CLASSES
// ============================================================

class Kiwi {
    constructor() {
        this.w = 40;
        this.h = 40;
        this.x = CANVAS_W / 2 - this.w / 2;
        this.groundY = CANVAS_H - 60;
        this.y = this.groundY;
        this.speed = KIWI_SPEED;
        this.lastBark = 0;
        this.rapidFire = false;
        this.rapidFireEnd = 0;
        this.invincible = false;
        this.invincibleEnd = 0;
        // Jump
        this.vy = 0;
        this.onGround = true;
        // Spinnies
        this.spinniesActive = false;
        this.spinniesEnd = 0;
        this.spinniesAngle = 0;
        this.spinniesFireTimer = 0;
    }

    jump() {
        if (!this.onGround) return;
        this.vy = JUMP_VELOCITY;
        this.onGround = false;
    }

    update(dt, now) {
        // Movement
        if (keys['ArrowLeft']) {
            this.x -= this.speed * dt;
        }
        if (keys['ArrowRight']) {
            this.x += this.speed * dt;
        }
        this.x = clamp(this.x, 0, CANVAS_W - this.w);

        // Jump physics
        if (!this.onGround) {
            this.vy += GRAVITY * dt;
            this.y += this.vy * dt;
            if (this.y >= this.groundY) {
                this.y = this.groundY;
                this.vy = 0;
                this.onGround = true;
            }
        }

        // Rapid fire timer
        if (this.rapidFire && now > this.rapidFireEnd) {
            this.rapidFire = false;
        }

        // Invincibility timer
        if (this.invincible && now > this.invincibleEnd) {
            this.invincible = false;
        }

        // Spinnies timer
        if (this.spinniesActive && now > this.spinniesEnd) {
            this.spinniesActive = false;
        }

        // Spinnies auto-fire: barks in 8 directions
        if (this.spinniesActive) {
            this.spinniesAngle += 15 * dt;
            this.spinniesFireTimer += dt * 1000;
            if (this.spinniesFireTimer >= SPINNIES_FIRE_RATE) {
                this.spinniesFireTimer = 0;
                const cx = this.x + this.w / 2;
                const cy = this.y + this.h / 2;
                for (let i = 0; i < 8; i++) {
                    const a = (Math.PI * 2 / 8) * i + this.spinniesAngle;
                    game.barks.push({
                        x: cx - 5,
                        y: cy - 8,
                        w: 10, h: 16,
                        speed: BARK_SPEED,
                        angle: Math.sin(a) * 0.8,
                        vy: -Math.cos(a) * BARK_SPEED
                    });
                }
                AudioSystem.playBark();
            }
        }

        // Shooting
        const cooldown = this.rapidFire ? BARK_COOLDOWN_RAPID : BARK_COOLDOWN;
        if (keys['Space'] && now - this.lastBark > cooldown) {
            this.lastBark = now;
            game.barks.push({
                x: this.x + this.w / 2 - 5,
                y: this.y - 10,
                w: 10,
                h: 16,
                speed: BARK_SPEED
            });
            AudioSystem.playBark();
        }
    }

    draw(now) {
        // Draw ground shadow when airborne
        if (!this.onGround) {
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(this.x + this.w / 2, this.groundY + this.h - 5, this.w / 2 * 0.8, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        // Blink when invincible
        if (this.invincible && Math.floor(now / 100) % 2 === 0) {
            ctx.globalAlpha = 0.4;
        }

        // Spinnies: full body spin with pink glow
        if (this.spinniesActive) {
            ctx.save();
            ctx.translate(this.x + this.w / 2, this.y + this.h / 2 - 4);
            ctx.rotate(this.spinniesAngle);
            ctx.shadowColor = COLORS.SPINNIES_PINK;
            ctx.shadowBlur = 20;
            drawKiwi(0, 0);
            ctx.shadowBlur = 0;
            ctx.restore();
        } else {
            // Rapid fire glow
            if (this.rapidFire) {
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15;
            }
            drawKiwi(this.x + this.w / 2, this.y + this.h / 2 - 4);
            ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;
    }

    getRect() {
        return { x: this.x + 4, y: this.y + 4, w: this.w - 8, h: this.h - 8 };
    }

    makeInvincible(duration) {
        this.invincible = true;
        this.invincibleEnd = performance.now() + duration;
    }
}

class Squirrel {

        this.x = x;
        this.y = y;
        this.w = 30;
        this.h = 30;
        this.alive = true;
        this.frame = 0;
    }

        if (!this.alive) return;
        drawSquirrel(this.x + this.w / 2, this.y + this.h / 2, this.frame);
    }

    getRect() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }
}

class Bird {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 28;
        this.h = 22;
        this.alive = true;
        this.frame = 0;
        this.baseY = y;
        this.time = Math.random() * Math.PI * 2;
        this.type = 'bird';
        this.dropTimer = 0;
    }

    update(dt) {
        this.time += dt * 3;
        this.y = this.baseY + Math.sin(this.time) * 20;
        this.frame = Math.floor(this.time * 2) % 2;
        this.dropTimer += dt * 1000;
    }

    draw() {
        if (!this.alive) return;
        drawBird(this.x + this.w / 2, this.y + this.h / 2, this.frame);
    }

    getRect() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
}

class Bee {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 22;
        this.h = 22;
        this.alive = true;
        this.frame = 0;
        this.time = Math.random() * Math.PI * 2;
        this.zigDir = 1;
        this.zigTimer = 0;
        this.type = 'bee';
        this.dropTimer = 0;
    }

    update(dt) {
        this.time += dt * 6;
        this.frame = Math.floor(this.time) % 2;
        this.zigTimer += dt;
        if (this.zigTimer > 0.5) { this.zigTimer = 0; this.zigDir *= -1; }
        this.x += BEE_SPEED * this.zigDir * dt * 0.3;
        // Keep in bounds
        if (this.x < 10) { this.x = 10; this.zigDir = 1; }
        if (this.x + this.w > CANVAS_W - 10) { this.x = CANVAS_W - 10 - this.w; this.zigDir = -1; }
        this.dropTimer += dt * 1000;
    }

    draw() {
        if (!this.alive) return;
        drawBee(this.x + this.w / 2, this.y + this.h / 2, this.frame);
    }

    getRect() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
}

class Mailman {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 30;
        this.h = 36;
        this.alive = true;
        this.hp = MAILMAN_HP;
        this.frame = 0;
        this.direction = 1;
        this.walkTimer = 0;
        this.type = 'mailman';
        this.throwTimer = 0;
    }

    update(dt) {
        this.x += MAILMAN_SPEED * this.direction * dt;
        if (this.x <= 5 || this.x + this.w >= CANVAS_W - 5) {
            this.direction *= -1;
        }
        this.walkTimer += dt;
        if (this.walkTimer > 0.3) {
            this.walkTimer = 0;
            this.frame++;
        }
        this.throwTimer += dt * 1000;
    }

    takeDamage() {
        this.hp--;
        if (this.hp <= 0) { this.alive = false; return true; }
        return false;
    }

    draw() {
        if (!this.alive) return;
        drawMailman(this.x + this.w / 2, this.y + this.h / 2, this.frame, this.hp);
    }

    getRect() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
}

class Boss {
    constructor(wave) {
        this.w = 80;
        this.h = 70;
        this.x = CANVAS_W / 2 - this.w / 2;
        this.y = 30;
        this.speed = BOSS_SPEED;
        this.direction = 1;
        this.maxHp = BOSS_HP_BASE + wave * 2;
        this.hp = this.maxHp;
        this.lastDrop = performance.now();
        this.alive = true;
        this.defeated = false;
        this.defeatTimer = 0;
    }

    update(dt, now) {
        // If defeated, count down before transitioning
        if (this.defeated) {
            this.defeatTimer -= dt * 1000;
            if (this.defeatTimer <= 0) {
                game.nextWave();
            }
            return;
        }

        this.x += this.speed * this.direction * dt;
        if (this.x <= 10) {
            this.direction = 1;
        }
        if (this.x + this.w >= CANVAS_W - 10) {
            this.direction = -1;
        }

        // Drop acorns
        if (now - this.lastDrop > BOSS_DROP_INTERVAL) {
            this.lastDrop = now;
            // Drop 1-3 acorns
            const count = randInt(1, 2);
            for (let i = 0; i < count; i++) {
                game.acorns.push({
                    x: this.x + randInt(10, this.w - 10),
                    y: this.y + this.h,
                    w: 10,
                    h: 12,
                    speed: ACORN_SPEED * 1.3
                });
            }
        }
    }

    draw() {
        if (!this.alive) return;
        drawRaccoon(this.x + this.w / 2, this.y + this.h / 2 - 5, this.hp, this.maxHp);
    }

    getRect() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }

    takeDamage() {
        this.hp--;
        AudioSystem.playBossHit();
        spawnExplosion(
            this.x + randInt(0, this.w),
            this.y + randInt(0, this.h),
            ['#ff4444', '#ffaa00', '#ffff00'],
            6
        );
        if (this.hp <= 0) {
            this.alive = false;
            this.defeated = true;
            this.defeatTimer = 1500;
            AudioSystem.playBossDefeat();
            spawnExplosion(
                this.x + this.w / 2,
                this.y + this.h / 2,
                ['#ff4444', '#ffaa00', '#ffff00', '#ffffff', '#ff8800'],
                30
            );
            return true; // defeated
        }
        return false;
    }
}

class PowerUp {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.w = 20;
        this.h = 20;
        this.type = type; // 'bone', 'treat', 'kiwi', 'spinnies'
        this.speed = POWERUP_DROP_SPEED;
        this.spawnTime = performance.now();
    }

    update(dt) {
        this.y += this.speed * dt;
    }

    draw() {
        const t = (performance.now() - this.spawnTime) / 1000;
        const cx = this.x + this.w / 2;
        const cy = this.y + this.h / 2;
        // Bobbing
        const bob = Math.sin(t * 3) * 2;

        if (this.type === 'bone') {
            drawGoldenBone(cx, cy + bob, t);
        } else if (this.type === 'treat') {
            drawTreat(cx, cy + bob);
        } else if (this.type === 'kiwi') {
            drawKiwiFruit(cx, cy + bob);
        } else if (this.type === 'spinnies') {
            drawSpinnies(cx, cy + bob, t);
        }
    }

    getRect() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }

    isOffScreen() {
        return this.y > CANVAS_H + 20;
    }
}

// ============================================================
//  STARFIELD / BACKGROUND
// ============================================================

const stars = [];
for (let i = 0; i < 80; i++) {
    stars.push({
        x: randInt(0, CANVAS_W),
        y: randInt(0, CANVAS_H - 100),
        size: randInt(1, 3),
        brightness: randFloat(0.3, 1.0),
        twinkleSpeed: randFloat(1, 4)
    });
}

function drawBackground(now) {
    // Sky
    ctx.fillStyle = COLORS.BG;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Stars
    stars.forEach(star => {
        const alpha = star.brightness * (0.5 + 0.5 * Math.sin(now / 1000 * star.twinkleSpeed));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(star.x, star.y, star.size, star.size);
    });
    ctx.globalAlpha = 1;

    // Grass area at bottom
    ctx.fillStyle = COLORS.GRASS;
    ctx.fillRect(0, CANVAS_H - 30, CANVAS_W, 30);
    // Grass blades
    ctx.fillStyle = '#2a5a2a';
    for (let i = 0; i < CANVAS_W; i += 8) {
        const h = 5 + Math.sin(i * 0.5 + now / 500) * 3;
        ctx.fillRect(i, CANVAS_H - 30 - h, 3, h);
    }

    // Fence
    ctx.fillStyle = COLORS.FENCE;
    const fenceY = CANVAS_H - 35;
    // Horizontal bars
    ctx.fillRect(0, fenceY - 15, CANVAS_W, 4);
    ctx.fillRect(0, fenceY - 5, CANVAS_W, 4);
    // Vertical posts
    for (let i = 0; i < CANVAS_W; i += 60) {
        ctx.fillRect(i, fenceY - 25, 6, 25);
        // Pointed top
        ctx.beginPath();
        ctx.moveTo(i, fenceY - 25);
        ctx.lineTo(i + 3, fenceY - 30);
        ctx.lineTo(i + 6, fenceY - 25);
        ctx.closePath();
        ctx.fill();
    }
}

// ============================================================
//  TEXT RENDERING (Retro style)
// ============================================================

function drawRetroText(text, x, y, size, color, align = 'center') {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(text, x + 2, y + 2);

    // Main text
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
}

function drawBlockText(text, x, y, scale, color) {
    // Draw chunky pixel-style text
    ctx.fillStyle = color;
    ctx.font = `bold ${scale}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Multiple layers for thickness
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(text, x + 3, y + 3);
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
    // Highlight
    ctx.globalAlpha = 0.3;
    ctx.fillText(text, x, y - 1);
    ctx.globalAlpha = 1;
}
