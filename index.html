const game = {
    state: STATES.TITLE,
    score: 0,
    highScore: parseInt(localStorage.getItem('kiwiBarkBlasterHigh') || '0'),
    lives: STARTING_LIVES,
    wave: 1,
    kiwi: null,
    squirrels: [],
    birds: [],
    bees: [],
    mailmen: [],
    boss: null,
    barks: [],
    acorns: [],
    powerUps: [],
    squirrelDirection: 1,
    squirrelSpeed: SQUIRREL_MOVE_BASE,
    squirrelMoveTimer: 0,
    squirrelAnimTimer: 0,
    squirrelFrame: 0,
    squirrelDropTimer: 0,
    screenFlash: 0,
    waveTransitionTimer: 0,
    waveWarningTimer: 0,
    titleAnimTimer: 0,
    gameOverNewHigh: false,

    // ZOOMIES MODE
    zoomiesActive: false,
    zoomiesEnd: 0,
    zoomiesDirection: 1,
    zoomiesDirChangeTimer: 0,
    zoomiesAfterimages: [], // [{x, y, alpha, scale}]
    zoomiesAutoFireTimer: 0,
    zoomiesShake: {x: 0, y: 0},
    zoomiesTimer: 0, // time since last random zoomies
    zoomiesTriggered: false,
    spinniesSpawnTimer: 0,

    startGame() {
        this.state = STATES.PLAYING;
        this.score = 0;
        this.lives = STARTING_LIVES;
        this.wave = 1;
        this.kiwi = new Kiwi();
        this.barks = [];
        this.acorns = [];
        this.powerUps = [];
        this.birds = [];
        this.bees = [];
        this.mailmen = [];
        this.boss = null;
        this.gameOverNewHigh = false;
        this.spinniesSpawnTimer = 0;
        this.spawnWave();
        // Ensure audio is initialized and resumed (critical for mobile)
        AudioSystem.init();
        AudioSystem.startMusic();
    },

    resetToTitle() {
        this.state = STATES.TITLE;
        this.barks = [];
        this.acorns = [];
        this.powerUps = [];
        this.squirrels = [];
        this.birds = [];
        this.bees = [];
        this.mailmen = [];
        this.boss = null;
    },

    spawnWave() {
        this.squirrels = [];
        this.birds = [];
        this.bees = [];
        this.mailmen = [];
        this.barks = [];
        this.acorns = [];
        this.powerUps = [];

        // Every 3rd wave is a boss wave
        if (this.wave % 3 === 0) {
            this.state = STATES.WAVE_TRANSITION;
            this.waveTransitionTimer = performance.now();
            this.waveWarningTimer = performance.now();
            return;
        }

        const rows = Math.min(SQUIRREL_ROWS_BASE + Math.floor((this.wave - 1) / 2), 6);
        const cols = SQUIRREL_COLS;
        const startX = (CANVAS_W - cols * SQUIRREL_STEP_X) / 2 + 15;
        const startY = 60;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                this.squirrels.push(new Squirrel(
                    startX + c * SQUIRREL_STEP_X,
                    startY + r * SQUIRREL_STEP_Y
                ));
            }
        }

        // Birds: appear from wave 2+
        if (this.wave >= 2) {
            const numBirds = Math.min(Math.floor(this.wave / 2), 4);
            for (let i = 0; i < numBirds; i++) {
                this.birds.push(new Bird(
                    randInt(50, CANVAS_W - 80),
                    randInt(40, 100)
                ));
            }
        }
        // Bees: appear from wave 4+
        if (this.wave >= 4) {
            const numBees = Math.min(Math.floor((this.wave - 3) / 2), 3);
            for (let i = 0; i < numBees; i++) {
                this.bees.push(new Bee(
                    randInt(50, CANVAS_W - 80),
                    randInt(50, 130)
                ));
            }
        }
        // Mailmen: appear from wave 5+
        if (this.wave >= 5) {
            const numMailmen = Math.min(Math.floor((this.wave - 4) / 3), 2);
            for (let i = 0; i < numMailmen; i++) {
                this.mailmen.push(new Mailman(
                    randInt(50, CANVAS_W - 80),
                    CANVAS_H - 130
                ));
            }
        }

        this.squirrelDirection = 1;
        this.squirrelSpeed = SQUIRREL_MOVE_BASE + this.wave * 5;
        this.squirrelMoveTimer = 0;
        this.squirrelDropTimer = 0;

        this.state = STATES.WAVE_TRANSITION;
        this.waveTransitionTimer = performance.now();
    },

    startBossWave() {
        this.boss = new Boss(this.wave);
        this.state = STATES.BOSS;
        this.barks = [];
        this.acorns = [];
        this.powerUps = [];
        this.birds = [];
        this.bees = [];
        this.mailmen = [];
        AudioSystem.playBossAppear();
    },

    nextWave() {
        this.wave++;
        this.spawnWave();
    },

    loseLife() {
        if (this.kiwi.invincible) return;
        this.lives--;
        this.kiwi.makeInvincible(INVINCIBILITY_DURATION);
        spawnExplosion(
            this.kiwi.x + this.kiwi.w / 2,
            this.kiwi.y + this.kiwi.h / 2,
            ['#ff4444', '#ff8800', '#ffff00'],
            15
        );
        if (this.lives <= 0) {
            this.gameOver();
        }
    },

    gameOver() {
        this.state = STATES.GAME_OVER;
        AudioSystem.stopMusic();
        AudioSystem.playGameOver();
        if (this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('kiwiBarkBlasterHigh', this.highScore.toString());
            this.gameOverNewHigh = true;
        }
    },

    collectPowerUp(powerUp) {
        AudioSystem.playPowerUp();
        switch (powerUp.type) {
            case 'bone':
                this.kiwi.rapidFire = true;
                this.kiwi.rapidFireEnd = performance.now() + RAPID_FIRE_DURATION;
                break;
            case 'treat':
                if (this.lives < MAX_LIVES) {
                    this.lives++;
                }
                break;
            case 'kiwi':
                // Screen clear bomb — clears ALL enemy types
                spawnScreenFlash();
                const aliveSquirrels = this.squirrels.filter(s => s.alive);
                aliveSquirrels.forEach(s => {
                    s.alive = false;
                    this.score += SCORE_SQUIRREL;
                    spawnExplosion(s.x + s.w / 2, s.y + s.h / 2,
                        [COLORS.KIWI_FRUIT_GREEN, COLORS.KIWI_FRUIT_LIGHT, '#ffffff'], 6);
                });
                this.birds.filter(b => b.alive).forEach(b => {
                    b.alive = false;
                    this.score += SCORE_BIRD;
                    spawnExplosion(b.x + b.w / 2, b.y + b.h / 2,
                        [COLORS.BIRD_BODY, COLORS.BIRD_WING, '#ffffff'], 6);
                });
                this.bees.filter(b => b.alive).forEach(b => {
                    b.alive = false;
                    this.score += SCORE_BEE;
                    spawnExplosion(b.x + b.w / 2, b.y + b.h / 2,
                        [COLORS.BEE_BODY, COLORS.BEE_STRIPE, '#ffffff'], 6);
                });
                this.mailmen.filter(m => m.alive).forEach(m => {
                    m.alive = false;
                    this.score += SCORE_MAILMAN;
                    spawnExplosion(m.x + m.w / 2, m.y + m.h / 2,
                        [COLORS.MAILMAN_SHIRT, COLORS.MAILMAN_HAT, '#ffffff'], 6);
                });
                break;
            case 'spinnies':
                this.kiwi.spinniesActive = true;
                this.kiwi.spinniesEnd = performance.now() + SPINNIES_DURATION;
                this.kiwi.spinniesAngle = 0;
                this.kiwi.spinniesFireTimer = 0;
                break;
        }
        // 15% chance any power-up triggers ZOOMIES
        if (Math.random() < 0.15) {
            this.triggerZoomies();
        }
    },

    triggerZoomies() {
        if (this.zoomiesActive) return;
        this.zoomiesActive = true;
        this.zoomiesEnd = performance.now() + 4000;
        this.zoomiesDirection = Math.random() < 0.5 ? -1 : 1;
        this.zoomiesDirChangeTimer = 0;
        this.zoomiesAfterimages = [];
        this.zoomiesAutoFireTimer = 0;
        this.kiwi.invincible = true;
        this.kiwi.invincibleEnd = performance.now() + 4200;
        // Reset jump state — force back to ground
        this.kiwi.y = this.kiwi.groundY;
        this.kiwi.vy = 0;
        this.kiwi.onGround = true;
        // Play a rapid series of barks to announce zoomies
        AudioSystem.playPowerUp();
    },

    maybeDropPowerUp(x, y) {
        if (Math.random() < POWERUP_CHANCE) {
            // Weighted: bone 40%, treat 25%, spinnies 20%, kiwi 15%
            const r = Math.random();
            let type;
            if (r < 0.40) type = 'bone';
            else if (r < 0.65) type = 'treat';
            else if (r < 0.85) type = 'spinnies';
            else type = 'kiwi';
            this.powerUps.push(new PowerUp(x - 10, y - 10, type));
        }
    }
};

// ============================================================
//  UPDATE FUNCTIONS
// ============================================================

function updateZoomies(dt, now, g) {
    if (!g.zoomiesActive) {
        // Random zoomies trigger every ~40-60 seconds
        g.zoomiesTimer += dt;
        if (g.zoomiesTimer > 45 + Math.random() * 15) {
            g.zoomiesTimer = 0;
            g.triggerZoomies();
        }
        return;
    }

    // Check if zoomies ended
    if (now > g.zoomiesEnd) {
        g.zoomiesActive = false;
        g.zoomiesAfterimages = [];
        g.zoomiesShake = {x: 0, y: 0};
        return;
    }

    // Override Kiwi movement — uncontrollable zoomies!
    g.zoomiesDirChangeTimer += dt;
    if (g.zoomiesDirChangeTimer > 0.25) {
        g.zoomiesDirChangeTimer = 0;
        // Random sharp direction changes
        g.zoomiesDirection = Math.random() < 0.5 ? -1 : 1;
    }

    g.kiwi.x += g.zoomiesDirection * KIWI_SPEED * 3 * dt;
    // Bounce off walls
    if (g.kiwi.x <= 0) { g.kiwi.x = 0; g.zoomiesDirection = 1; }
    if (g.kiwi.x >= CANVAS_W - g.kiwi.w) { g.kiwi.x = CANVAS_W - g.kiwi.w; g.zoomiesDirection = -1; }

    // Auto-fire in spread pattern
    g.zoomiesAutoFireTimer += dt;
    if (g.zoomiesAutoFireTimer > 0.06) {
        g.zoomiesAutoFireTimer = 0;
        // Spray barks: up, up-left, up-right
        const cx = g.kiwi.x + g.kiwi.w / 2;
        const cy = g.kiwi.y;
        const angles = [-0.3, 0, 0.3];
        const angle = angles[Math.floor(Math.random() * angles.length)];
        g.barks.push({
            x: cx - 5 + angle * 30,
            y: cy - 10,
            w: 10, h: 16,
            speed: BARK_SPEED * 1.5,
            angle: angle
        });
        AudioSystem.playBark();
    }

    // Add afterimage trail
    g.zoomiesAfterimages.push({
        x: g.kiwi.x + g.kiwi.w / 2,
        y: g.kiwi.y + g.kiwi.h / 2,
        alpha: 0.6,
        hue: (now * 0.5) % 360
    });
    // Fade and remove old afterimages
    g.zoomiesAfterimages = g.zoomiesAfterimages.filter(a => {
        a.alpha -= dt * 2;
        return a.alpha > 0;
    });

    // Screen shake
    g.zoomiesShake.x = (Math.random() - 0.5) * 8;
    g.zoomiesShake.y = (Math.random() - 0.5) * 6;
}

function updatePlaying(dt, now) {
    const g = game;

    // Update Kiwi
    g.kiwi.update(dt, now);

    // ZOOMIES update (overrides kiwi movement when active)
    updateZoomies(dt, now, g);

    // Guaranteed spinnies spawn timer
    g.spinniesSpawnTimer += dt;
    if (g.spinniesSpawnTimer >= SPINNIES_SPAWN_INTERVAL) {
        g.spinniesSpawnTimer = 0;
        g.powerUps.push(new PowerUp(randInt(50, CANVAS_W - 50), -20, 'spinnies'));
    }

    // Update barks (handle angled zoomies/spinnies barks)
    g.barks.forEach(b => {
        if (b.vy !== undefined) {
            // Spinnies bark: custom vy direction
            b.y += b.vy * dt;
            if (b.angle) b.x += b.angle * b.speed * dt;
        } else {
            b.y -= b.speed * dt;
            if (b.angle) b.x += b.angle * b.speed * dt;
        }
    });
    g.barks = g.barks.filter(b => b.y > -20 && b.y < CANVAS_H + 20 && b.x > -20 && b.x < CANVAS_W + 20);

    // Update acorns
    g.acorns.forEach(a => {
        a.y += a.speed * dt;
        if (a.vx) a.x += a.vx * dt;
        if (a.vy !== undefined) {
            a.vy += 200 * dt; // gravity for thrown packages
            a.y += a.vy * dt;
        }
    });
    g.acorns = g.acorns.filter(a => a.y < CANVAS_H + 20 && a.y > -20);

    // Update power-ups
    g.powerUps.forEach(p => p.update(dt));
    g.powerUps = g.powerUps.filter(p => !p.isOffScreen());

    // Squirrel animation
    g.squirrelAnimTimer += dt;
    if (g.squirrelAnimTimer > 0.5) {
        g.squirrelAnimTimer = 0;
        g.squirrelFrame = 1 - g.squirrelFrame;
        g.squirrels.forEach(s => {
            if (s.alive) s.frame = g.squirrelFrame;
        });
    }

    // Update new enemies
    g.birds.filter(e => e.alive).forEach(e => e.update(dt));
    g.bees.filter(e => e.alive).forEach(e => e.update(dt));
    g.mailmen.filter(e => e.alive).forEach(e => e.update(dt));

    // Move squirrels
    const aliveSquirrels = g.squirrels.filter(s => s.alive);
    const aliveBirds = g.birds.filter(b => b.alive);
    const aliveBees = g.bees.filter(b => b.alive);
    const aliveMailmen = g.mailmen.filter(m => m.alive);

    // Wave completion: all enemy types cleared
    if (aliveSquirrels.length === 0 && aliveBirds.length === 0 &&
        aliveBees.length === 0 && aliveMailmen.length === 0) {
        g.nextWave();
        return;
    }

    // Speed increases as fewer squirrels remain
    if (aliveSquirrels.length > 0) {
        const speedMult = 1 + (1 - aliveSquirrels.length / g.squirrels.length) * 2;
        const moveAmount = g.squirrelSpeed * speedMult * dt;

        let hitEdge = false;
        aliveSquirrels.forEach(s => {
            s.x += moveAmount * g.squirrelDirection;
            if (s.x + s.w >= CANVAS_W - 5 || s.x <= 5) {
                hitEdge = true;
            }
        });

        if (hitEdge) {
            g.squirrelDirection *= -1;
            aliveSquirrels.forEach(s => {
                s.y += 10;
                if (s.y + s.h >= g.kiwi.groundY) {
                    g.gameOver();
                    return;
                }
            });
            // Birds descend too when squirrels descend
            aliveBirds.forEach(b => { b.baseY += 10; });
        }
    }

    // Squirrels drop acorns
    g.squirrelDropTimer += dt;
    const dropInterval = Math.max(0.3, (SQUIRREL_DROP_INTERVAL_BASE / 1000) - g.wave * 0.1);
    if (g.squirrelDropTimer > dropInterval && aliveSquirrels.length > 0) {
        g.squirrelDropTimer = 0;
        const shooter = aliveSquirrels[randInt(0, aliveSquirrels.length - 1)];
        g.acorns.push({
            x: shooter.x + shooter.w / 2 - 5,
            y: shooter.y + shooter.h,
            w: 10, h: 12,
            speed: ACORN_SPEED + g.wave * 10,
            type: 'acorn'
        });
    }

    // Birds drop feathers
    aliveBirds.forEach(bird => {
        if (bird.dropTimer >= BIRD_DROP_INTERVAL) {
            bird.dropTimer = 0;
            g.acorns.push({
                x: bird.x + bird.w / 2 - 3,
                y: bird.y + bird.h,
                w: 6, h: 12,
                speed: ACORN_SPEED + g.wave * 5,
                type: 'feather'
            });
        }
    });

    // Bees drop stingers
    aliveBees.forEach(bee => {
        if (bee.dropTimer >= BEE_DROP_INTERVAL) {
            bee.dropTimer = 0;
            g.acorns.push({
                x: bee.x + bee.w / 2 - 3,
                y: bee.y + bee.h,
                w: 6, h: 14,
                speed: ACORN_SPEED + g.wave * 8,
                type: 'stinger'
            });
        }
    });

    // Mailmen throw packages (arcing upward)
    aliveMailmen.forEach(mm => {
        if (mm.throwTimer >= MAILMAN_THROW_INTERVAL) {
            mm.throwTimer = 0;
            g.acorns.push({
                x: mm.x + mm.w / 2 - 5,
                y: mm.y - 5,
                w: 10, h: 8,
                speed: 0,
                vx: (Math.random() - 0.5) * 100,
                vy: -250,
                type: 'package'
            });
        }
    });

    // Collision: barks vs squirrels
    g.barks = g.barks.filter(bark => {
        let hit = false;
        aliveSquirrels.forEach(sq => {
            if (sq.alive && rectCollide(bark, sq.getRect())) {
                sq.alive = false;
                hit = true;
                g.score += SCORE_SQUIRREL;
                AudioSystem.playSquirrelHit();
                spawnExplosion(sq.x + sq.w / 2, sq.y + sq.h / 2,
                    [COLORS.SQUIRREL_BODY, COLORS.SQUIRREL_LIGHT, '#ffaa44', '#ffdd88'], 10);
                g.maybeDropPowerUp(sq.x + sq.w / 2, sq.y + sq.h / 2);
            }
        });
        if (hit) return false;

        // Barks vs birds
        aliveBirds.forEach(bird => {
            if (bird.alive && rectCollide(bark, bird.getRect())) {
                bird.alive = false;
                hit = true;
                g.score += SCORE_BIRD;
                AudioSystem.playSquirrelHit();
                spawnExplosion(bird.x + bird.w / 2, bird.y + bird.h / 2,
                    [COLORS.BIRD_BODY, COLORS.BIRD_WING, '#ffffff'], 8);
                g.maybeDropPowerUp(bird.x + bird.w / 2, bird.y + bird.h / 2);
            }
        });
        if (hit) return false;

        // Barks vs bees
        aliveBees.forEach(bee => {
            if (bee.alive && rectCollide(bark, bee.getRect())) {
                bee.alive = false;
                hit = true;
                g.score += SCORE_BEE;
                AudioSystem.playSquirrelHit();
                spawnExplosion(bee.x + bee.w / 2, bee.y + bee.h / 2,
                    [COLORS.BEE_BODY, COLORS.BEE_STRIPE, '#FFD700'], 8);
                g.maybeDropPowerUp(bee.x + bee.w / 2, bee.y + bee.h / 2);
            }
        });
        if (hit) return false;

        // Barks vs mailmen (takes 2 hits)
        aliveMailmen.forEach(mm => {
            if (mm.alive && rectCollide(bark, mm.getRect())) {
                hit = true;
                const killed = mm.takeDamage();
                if (killed) {
                    g.score += SCORE_MAILMAN;
                    spawnExplosion(mm.x + mm.w / 2, mm.y + mm.h / 2,
                        [COLORS.MAILMAN_SHIRT, COLORS.MAILMAN_HAT, '#ffffff'], 10);
                    g.maybeDropPowerUp(mm.x + mm.w / 2, mm.y + mm.h / 2);
                } else {
                    spawnExplosion(mm.x + mm.w / 2, mm.y + mm.h / 2,
                        ['#ffffff', '#ffaaaa'], 4);
                }
                AudioSystem.playSquirrelHit();
            }
        });
        return !hit;
    });

    // Collision: acorns/projectiles vs Kiwi
    const kiwiRect = g.kiwi.getRect();
    g.acorns = g.acorns.filter(acorn => {
        if (rectCollide(acorn, kiwiRect)) {
            g.loseLife();
            return false;
        }
        return true;
    });

    // Collision: Kiwi vs power-ups
    g.powerUps = g.powerUps.filter(p => {
        if (rectCollide(p.getRect(), kiwiRect)) {
            g.collectPowerUp(p);
            return false;
        }
        return true;
    });
}

function updateBoss(dt, now) {
    const g = game;

    g.kiwi.update(dt, now);
    updateZoomies(dt, now, g);

    // Guaranteed spinnies spawn timer
    g.spinniesSpawnTimer += dt;
    if (g.spinniesSpawnTimer >= SPINNIES_SPAWN_INTERVAL) {
        g.spinniesSpawnTimer = 0;
        g.powerUps.push(new PowerUp(randInt(50, CANVAS_W - 50), -20, 'spinnies'));
    }

    // Update boss (keep updating even when defeated for the defeat timer)
    if (g.boss) {
        g.boss.update(dt, now);
    }

    // Update barks (handle spinnies barks with custom vy)
    g.barks.forEach(b => {
        if (b.vy !== undefined) {
            b.y += b.vy * dt;
            if (b.angle) b.x += b.angle * b.speed * dt;
        } else {
            b.y -= b.speed * dt;
            if (b.angle) b.x += b.angle * b.speed * dt;
        }
    });
    g.barks = g.barks.filter(b => b.y > -20 && b.y < CANVAS_H + 20 && b.x > -20 && b.x < CANVAS_W + 20);

    // Update acorns
    g.acorns.forEach(a => {
        a.y += a.speed * dt;
    });
    g.acorns = g.acorns.filter(a => a.y < CANVAS_H + 20);

    // Update power-ups
    g.powerUps.forEach(p => p.update(dt));
    g.powerUps = g.powerUps.filter(p => !p.isOffScreen());

    // Collision: barks vs boss
    if (g.boss && g.boss.alive) {
        g.barks = g.barks.filter(bark => {
            if (rectCollide(bark, g.boss.getRect())) {
                g.score += SCORE_BOSS_HIT;
                const defeated = g.boss.takeDamage();
                if (defeated) {
                    g.score += SCORE_BOSS_KILL;
                    // Drop power-up on boss defeat
                    g.powerUps.push(new PowerUp(
                        g.boss.x + g.boss.w / 2 - 10,
                        g.boss.y + g.boss.h / 2 - 10,
                        'treat'
                    ));
                    // Boss handles its own defeat timer and calls nextWave
                }
                return false;
            }
            return true;
        });
    }

    // Collision: acorns vs Kiwi
    const kiwiRect = g.kiwi.getRect();
    g.acorns = g.acorns.filter(acorn => {
        if (rectCollide(acorn, kiwiRect)) {
            g.loseLife();
            return false;
        }
        return true;
    });

    // Collision: Kiwi vs power-ups
    g.powerUps = g.powerUps.filter(p => {
        if (rectCollide(p.getRect(), kiwiRect)) {
            g.collectPowerUp(p);
            return false;
        }
        return true;
    });
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(dt);
        if (particles[i].isDead()) {
            particles.splice(i, 1);
        }
    }
}

// ============================================================
//  DRAW FUNCTIONS
// ============================================================

function drawHUD() {
    const g = game;

    // Score
    drawRetroText(`SCORE: ${g.score}`, 10, 20, 16, COLORS.HUD, 'left');

    // High Score
    drawRetroText(`HI: ${g.highScore}`, CANVAS_W / 2, 20, 16, COLORS.TEXT_YELLOW, 'center');

    // Wave
    drawRetroText(`WAVE ${g.wave}`, CANVAS_W - 10, 20, 16, COLORS.HUD, 'right');

    // Lives (as mini Kiwis)
    for (let i = 0; i < g.lives; i++) {
        drawKiwiMini(20 + i * 28, CANVAS_H - 16);
    }

    // Rapid fire indicator
    if (g.kiwi && g.kiwi.rapidFire) {
        const remaining = Math.max(0, (g.kiwi.rapidFireEnd - performance.now()) / 1000);
        drawRetroText(`RAPID FIRE! ${remaining.toFixed(1)}s`, CANVAS_W / 2, 40, 12, COLORS.BONE_GOLD, 'center');
    }

    // Spinnies indicator
    if (g.kiwi && g.kiwi.spinniesActive) {
        const remaining = Math.max(0, (g.kiwi.spinniesEnd - performance.now()) / 1000);
        drawRetroText(`SPINNIES! ${remaining.toFixed(1)}s`, CANVAS_W / 2, 55, 12, COLORS.SPINNIES_PINK, 'center');
    }
}

function drawTitleScreen(now) {
    const t = now / 1000;

    // Animated background squirrels
    for (let i = 0; i < 5; i++) {
        const sx = (i * 160 + (now / 20) % 800) % 880 - 40;
        const sy = CANVAS_H * 0.15 + Math.sin(t * 2 + i) * 20;
        ctx.globalAlpha = 0.3;
        drawSquirrel(sx, sy, Math.floor(t * 2) % 2);
        ctx.globalAlpha = 1;
    }

    // Title
    const titleY = CANVAS_H * 0.22 + Math.sin(t * 1.5) * 5;
    drawBlockText("KIWI'S", CANVAS_W / 2, titleY - 30, 48, COLORS.TEXT_YELLOW);
    drawBlockText("BARK BLASTER", CANVAS_W / 2, titleY + 30, 42, COLORS.TEXT_GREEN);

    // Kiwi sprite - large and centered
    drawKiwi(CANVAS_W / 2, CANVAS_H * 0.48, 2.5);

    // Flashing start text
    if (Math.floor(t * 2) % 2 === 0) {
        const startMsg = isTouchDevice ? 'TAP TO START' : 'PRESS ENTER TO START';
        drawRetroText(startMsg, CANVAS_W / 2, CANVAS_H * 0.68, 20, COLORS.TEXT, 'center');
    }

    // High score
    drawRetroText(`HIGH SCORE: ${game.highScore}`, CANVAS_W / 2, CANVAS_H * 0.78, 16, COLORS.TEXT_YELLOW, 'center');

    // Controls
    const controlsMsg = isTouchDevice
        ? 'USE ON-SCREEN BUTTONS TO MOVE AND BARK!'
        : '\u2190 \u2192 MOVE   \u2191 JUMP   SPACE BARK   Z ZOOMIES';
    drawRetroText(controlsMsg, CANVAS_W / 2, CANVAS_H * 0.86, 12, '#888888', 'center');

    // Credits
    drawRetroText('DEFEND THE BACKYARD FROM SQUIRREL INVADERS!', CANVAS_W / 2, CANVAS_H * 0.91, 11, '#666666', 'center');
}

function drawWaveTransition(now) {
    const g = game;
    const elapsed = now - g.waveTransitionTimer;

    if (g.wave % 3 === 0) {
        // Boss warning
        const flash = Math.floor(elapsed / 200) % 2;
        if (flash) {
            drawBlockText('WARNING!', CANVAS_W / 2, CANVAS_H / 2 - 30, 36, COLORS.TEXT_RED);
            drawBlockText('GIANT RACCOON APPROACHING!', CANVAS_W / 2, CANVAS_H / 2 + 20, 24, COLORS.TEXT_YELLOW);
        }
    } else {
        drawBlockText(`WAVE ${g.wave}`, CANVAS_W / 2, CANVAS_H / 2, 48, COLORS.TEXT_GREEN);
    }

    if (elapsed > WAVE_TRANSITION_DURATION) {
        if (g.wave % 3 === 0) {
            g.startBossWave();
        } else {
            g.state = STATES.PLAYING;
        }
    }
}

function drawGameOverScreen(now) {
    const t = now / 1000;

    drawBlockText('GAME OVER', CANVAS_W / 2, CANVAS_H / 2 - 60, 48, COLORS.TEXT_RED);

    drawRetroText(`FINAL SCORE: ${game.score}`, CANVAS_W / 2, CANVAS_H / 2, 24, COLORS.TEXT, 'center');

    drawRetroText(`WAVE REACHED: ${game.wave}`, CANVAS_W / 2, CANVAS_H / 2 + 35, 16, COLORS.TEXT, 'center');

    if (game.gameOverNewHigh) {
        const color = Math.floor(t * 4) % 2 === 0 ? COLORS.TEXT_YELLOW : COLORS.TEXT_GREEN;
        drawBlockText('NEW HIGH SCORE!', CANVAS_W / 2, CANVAS_H / 2 + 75, 28, color);
    }

    if (Math.floor(t * 2) % 2 === 0) {
        const restartMsg = isTouchDevice ? 'TAP TO CONTINUE' : 'PRESS ENTER TO RESTART';
        drawRetroText(restartMsg, CANVAS_W / 2, CANVAS_H / 2 + 130, 18, COLORS.TEXT, 'center');
    }
}

function drawScreenFlash(dt) {
    if (game.screenFlash > 0) {
        ctx.globalAlpha = game.screenFlash;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.globalAlpha = 1;
        game.screenFlash -= dt * 3;
        if (game.screenFlash < 0) game.screenFlash = 0;
    }
}

// ============================================================
//  MAIN GAME LOOP
// ============================================================

let lastTime = performance.now();

function gameLoop(timestamp) {
    const now = timestamp;
    let dt = (now - lastTime) / 1000;
    lastTime = now;

    // Clamp dt to avoid spiral of death
    dt = Math.min(dt, 0.05);

    // --- UPDATE ---
    switch (game.state) {
        case STATES.PLAYING:
            updatePlaying(dt, now);
            break;
        case STATES.BOSS:
            updateBoss(dt, now);
            break;
        case STATES.WAVE_TRANSITION:
            // Just wait and draw, Kiwi can still move
            if (game.kiwi) game.kiwi.update(dt, now);
            break;
    }

    updateParticles(dt);

    // --- DRAW ---
    // Screen shake from zoomies
    if (game.zoomiesActive) {
        ctx.save();
        ctx.translate(game.zoomiesShake.x, game.zoomiesShake.y);
    }

    // Clear
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Background
    drawBackground(now);

    switch (game.state) {
        case STATES.TITLE:
            drawTitleScreen(now);
            break;

        case STATES.PLAYING:
            // Draw squirrels
            game.squirrels.forEach(s => s.draw());
            // Draw new enemies
            game.birds.forEach(e => e.draw());
            game.bees.forEach(e => e.draw());
            game.mailmen.forEach(e => e.draw());
            // Draw barks
            game.barks.forEach(b => drawBark(b.x + b.w / 2, b.y));
            // Draw projectiles (acorns, feathers, stingers, packages)
            game.acorns.forEach(a => {
                if (a.type === 'feather') drawFeather(a.x + a.w / 2, a.y + a.h / 2);
                else if (a.type === 'stinger') drawStinger(a.x + a.w / 2, a.y + a.h / 2);
                else if (a.type === 'package') drawPackage(a.x + a.w / 2, a.y + a.h / 2);
                else drawAcorn(a.x + a.w / 2, a.y + a.h / 2);
            });
            // Draw power-ups
            game.powerUps.forEach(p => p.draw());
            // Draw Kiwi
            game.kiwi.draw(now);
            // HUD
            drawHUD();
            break;

        case STATES.BOSS:
            // Draw boss
            if (game.boss) game.boss.draw();
            // Draw barks
            game.barks.forEach(b => drawBark(b.x + b.w / 2, b.y));
            // Draw acorns
            game.acorns.forEach(a => drawAcorn(a.x + a.w / 2, a.y + a.h / 2));
            // Draw power-ups
            game.powerUps.forEach(p => p.draw());
            // Draw Kiwi
            game.kiwi.draw(now);
            // HUD
            drawHUD();
            break;

        case STATES.WAVE_TRANSITION:
            // Still draw existing entities
            game.squirrels.forEach(s => s.draw());
            game.birds.forEach(e => e.draw());
            game.bees.forEach(e => e.draw());
            game.mailmen.forEach(e => e.draw());
            if (game.kiwi) game.kiwi.draw(now);
            drawHUD();
            drawWaveTransition(now);
            break;

        case STATES.GAME_OVER:
            drawGameOverScreen(now);
            break;
    }

    // Particles (always on top)
    particles.forEach(p => p.draw());

    // Screen flash (always on top)
    drawScreenFlash(dt);

    // ZOOMIES visual effects
    if (game.zoomiesActive) {
        // Draw rainbow afterimages
        game.zoomiesAfterimages.forEach(a => {
            ctx.globalAlpha = a.alpha * 0.5;
            ctx.fillStyle = `hsl(${a.hue}, 100%, 60%)`;
            ctx.beginPath();
            ctx.arc(a.x, a.y, 18 + a.alpha * 10, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Spinning "ZOOMIES!!!" text
        const elapsed = (performance.now() - (game.zoomiesEnd - 4000)) / 1000;
        const spin = elapsed * 3;
        const bounce = Math.sin(elapsed * 12) * 15;
        const scale = 1.5 + Math.sin(elapsed * 8) * 0.3;
        ctx.save();
        ctx.translate(CANVAS_W / 2, CANVAS_H / 2 + bounce);
        ctx.rotate(Math.sin(spin) * 0.15);
        ctx.scale(scale, scale);
        // Rainbow cycling text
        const hue = (now * 0.3) % 360;
        ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.font = 'bold 36px monospace';
        ctx.textAlign = 'center';
        ctx.strokeText('ZOOMIES!!!', 0, 0);
        ctx.fillText('ZOOMIES!!!', 0, 0);
        ctx.restore();

        // Rainbow border flash
        ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
        ctx.lineWidth = 4;
        ctx.strokeRect(2, 2, CANVAS_W - 4, CANVAS_H - 4);

        // End screen shake transform
        ctx.restore();
    }

    // Scanline effect on canvas (supplementing CSS)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
    for (let y = 0; y < CANVAS_H; y += 3) {
        ctx.fillRect(0, y, CANVAS_W, 1);
    }

    requestAnimationFrame(gameLoop);
}

// ============================================================
//  START
// ============================================================

requestAnimationFrame(gameLoop);

</script>
